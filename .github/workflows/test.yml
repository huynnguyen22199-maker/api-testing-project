name: API Testing
on:
  push:
    branches:[ master ]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install requests pytest pyjwt mysql-connector-python anthropic python-dotenv
    
    - name: Run tests
      run: |
        python -m pytest test_negative.py test_auth.py -v